name: Weather Report Bot

on:
  schedule:
    - cron: "0 * * * *"   # Every hour — dashboard always refreshes
  workflow_dispatch:       # Manual trigger always runs everything

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Download emoji assets
        run: pixi run download-emoji

      # ── Determine report period + whether to post social ──────────────────
      - name: Determine report period
        id: report_time
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          pixi run python -c "
          from datetime import datetime
          import pytz, os
          pt  = pytz.timezone('America/Los_Angeles')
          now = datetime.now(pt)
          h   = now.hour

          period = 'morning' if 6 <= h < 14 else 'evening'
          ts     = now.strftime('%-I:%M %p PT | %B %d, %Y')

          # Social posts only at 7 AM and 6 PM PT
          # workflow_dispatch (manual run) always posts
          event      = os.environ.get('GITHUB_EVENT_NAME', '')
          is_social  = 'true' if (h in (7, 18) or event == 'workflow_dispatch') else 'false'

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'REPORT_PERIOD={period}\n')
              f.write(f'TIMESTAMP={ts}\n')
              f.write(f'POST_SOCIAL={is_social}\n')

          print(f'Period: {period} | {ts} | post_social={is_social}')
          "

      # ── Generate cards + JSON (every run) ─────────────────────────────────
      - name: Generate original chart
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run chart

      - name: Generate K5-style cards
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: |
          pixi run python -c "
          import os, sys
          sys.path.insert(0, 'src')
          from weather import get_weather_data
          from chart_k5 import create_k5_charts
          api_key = os.environ['OPENWEATHER_API_KEY']
          data    = get_weather_data(api_key)
          try:
              from weather import get_forecast_data
              forecast = get_forecast_data(api_key)
          except Exception as e:
              print(f'Forecast skipped: {e}')
              forecast = {}
          create_k5_charts(data, forecast_data=forecast,
                           report_period=os.environ.get('REPORT_PERIOD','morning'),
                           timestamp=os.environ.get('TIMESTAMP',''))
          "

      - name: Export JSON for dashboard
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run python src/export_json.py

      # ── Commit PNGs + JSON back to repo ───────────────────────────────────
      - name: Commit dashboard data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add -f weather_*.png weather_data.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update weather data [skip ci]"
          git push

      # ── Social posts — morning (7 AM PT) and evening (6 PM PT) only ───────
      - name: Post to Twitter
        if: steps.report_time.outputs.POST_SOCIAL == 'true'
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run twitter

      - name: Post to BlueSky
        if: steps.report_time.outputs.POST_SOCIAL == 'true'
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run bluesky

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload chart artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weather-charts
          path: |
            weather_report.png
            weather_report_k5.png
            weather_*.png
            weather_data.json
          retention-days: 7
