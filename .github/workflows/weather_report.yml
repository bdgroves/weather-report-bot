name: Weather Report Bot

on:
  schedule:
    - cron: "0 15 * * *"   # 7:00 AM PT
    - cron: "0 2 * * *"    # 6:00 PM PT
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Determine report period
        id: report_time
        run: |
          pixi run python -c "
          from datetime import datetime
          import pytz
          pt  = pytz.timezone('America/Los_Angeles')
          now = datetime.now(pt)
          period = 'morning' if 6 <= now.hour < 14 else 'evening'
          ts = now.strftime('%I:%M %p PT').lstrip('0') + now.strftime(' | %B ') + str(now.day) + now.strftime(', %Y')
          with open('$GITHUB_OUTPUT', 'a') as f:
              f.write(f'REPORT_PERIOD={period}\n')
              f.write(f'TIMESTAMP={ts}\n')
          print(f'Period: {period} | {ts}')
          "

      - name: Generate chart
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run chart

      - name: Post to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run twitter

      - name: Post to BlueSky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run bluesky

      - name: Commit updated PNGs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weather_report.png weather_lakewood.png weather_groveland.png weather_death_valley.png weather_reno.png
          git diff --staged --quiet || git commit -m "bot: update weather cards [skip ci]"
          git push

      - name: Upload chart artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weather-charts
          path: |
            weather_report.png
            weather_lakewood.png
            weather_groveland.png
            weather_death_valley.png
            weather_reno.png
          retention-days: 7
