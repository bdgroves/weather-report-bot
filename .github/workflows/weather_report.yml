name: Weather Report Bot

on:
  schedule:
    - cron: "0 15 * * *"   # 7:00 AM PT
    - cron: "0 2 * * *"    # 6:00 PM PT
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Determine report period
        id: report_time
        run: |
          pixi run python -c "
          from datetime import datetime
          import pytz
          pt  = pytz.timezone('America/Los_Angeles')
          now = datetime.now(pt)
          period = 'morning' if 6 <= now.hour < 14 else 'evening'
          ts = now.strftime('%I:%M %p PT').lstrip('0') + now.strftime(' | %B ') + str(now.day) + now.strftime(', %Y')
          with open('$GITHUB_OUTPUT', 'a') as f:
              f.write(f'REPORT_PERIOD={period}\n')
              f.write(f'TIMESTAMP={ts}\n')
          print(f'Period: {period} | {ts}')
          "

      - name: Generate broadcast cards (original 3-panel)
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run chart

      - name: Generate K5-style cards
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: |
          pixi run python -c "
          import sys, os
          sys.path.insert(0, 'src')
          from weather import get_weather_data
          from chart_k5 import create_k5_charts
          key = os.environ['OPENWEATHER_API_KEY']
          data = get_weather_data(key)
          create_k5_charts(data, report_period=os.environ.get('REPORT_PERIOD','morning'), timestamp=os.environ.get('TIMESTAMP',''))
          "

      - name: Export weather data to JSON for dashboard
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: |
          pixi run python src/export_json.py

      - name: Post to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run twitter

      - name: Post to BlueSky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          REPORT_PERIOD: ${{ steps.report_time.outputs.REPORT_PERIOD }}
          TIMESTAMP: ${{ steps.report_time.outputs.TIMESTAMP }}
        run: pixi run bluesky

      - name: Commit all outputs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weather_report.png weather_lakewood.png weather_groveland.png weather_death_valley.png weather_reno.png
          git add weather_report_k5.png weather_lakewood_k5.png weather_groveland_k5.png weather_death_valley_k5.png weather_reno_k5.png || true
          git add weather_data.json || true
          git diff --staged --quiet || git commit -m "bot: update weather cards + dashboard data [skip ci]"
          git push

      - name: Upload chart artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weather-charts
          path: |
            weather_report.png
            weather_lakewood.png
            weather_groveland.png
            weather_death_valley.png
            weather_reno.png
            weather_report_k5.png
            weather_lakewood_k5.png
            weather_groveland_k5.png
            weather_death_valley_k5.png
            weather_reno_k5.png
            weather_data.json
          retention-days: 7
